name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  # ── 1. Secret scanning ─────────────────────────────────────────────────────
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --verbose --redact

  # ── 2. Terraform format + validate ────────────────────────────────────────
  terraform:
    name: Terraform checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.15"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Validate — terraform/
        run: terraform init -backend=false && terraform validate
        working-directory: terraform/

      - name: Validate — bootstrap/
        run: terraform init -backend=false && terraform validate
        working-directory: bootstrap/

  # ── 3. Terraform security (tfsec) ─────────────────────────────────────────
  tfsec:
    name: Terraform security (tfsec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/
          soft_fail: true

  # ── 4. Python lint (pylint) ───────────────────────────────────────────────
  pylint:
    name: Python lint (pylint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pylint anthropic

      - name: Run pylint
        run: pylint .github/scripts/ --fail-under=8.0

  # ── 5. Python security (bandit) ───────────────────────────────────────────
  bandit:
    name: Python security (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: bandit -r .github/scripts/ -ll

  # ── 6. Python type checking (mypy) ───────────────────────────────────────
  mypy:
    name: Python type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install mypy anthropic

      - name: Run mypy
        run: mypy .github/scripts/ --ignore-missing-imports --disallow-untyped-defs --warn-redundant-casts

  # ── 7. Shell script checks (shellcheck) ──────────────────────────────────
  shellcheck:
    name: Shell script checks (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: shellcheck .github/smoke-tests/*.sh

  # ── 8. IaC deep scan (checkov) ───────────────────────────────────────────
  checkov:
    name: IaC deep scan (checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install checkov
        run: pip install checkov

      - name: Scan terraform/
        run: checkov -d terraform/ --quiet --soft-fail

      - name: Scan bootstrap/
        run: checkov -d bootstrap/ --quiet --soft-fail

      - name: Scan GitHub Actions workflows
        run: checkov -d .github/workflows/ --quiet --soft-fail
