name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy to
        required: true
        type: choice
        options:
          - dev

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: terraform/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.15"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="key=env/${{ inputs.environment }}/terraform.tfstate"

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file="envs/${{ inputs.environment }}.tfvars" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply tfplan

      # ── Smoke tests ────────────────────────────────────────────────────────

      - name: Smoke — plan is clean (no drift)
        run: |
          terraform plan \
            -var-file="envs/${{ inputs.environment }}.tfvars" \
            -detailed-exitcode

      - name: Smoke — AWS resource health
        working-directory: .
        run: bash .github/smoke-tests/aws-health.sh
        env:
          ENVIRONMENT: ${{ inputs.environment }}

      - name: Smoke — HTTP endpoints
        working-directory: .
        run: bash .github/smoke-tests/http-checks.sh
        env:
          ENVIRONMENT: ${{ inputs.environment }}
