name: Update Documentation

on:
  push:
    branches: [dev, main]
    paths-ignore:
      - 'documentation.md'

permissions:
  contents: write

jobs:
  generate-docs:
    name: Regenerate documentation.md
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'eu-north-1' }}

      - name: Fetch Anthropic API key from Secrets Manager
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id jarvis/dev/anthropic-api-key \
            --query SecretString \
            --output text)
          echo "::add-mask::$SECRET"
          echo "ANTHROPIC_API_KEY=$SECRET" >> "$GITHUB_ENV"

      - name: Install Anthropic SDK
        run: pip install anthropic

      - name: Generate documentation
        run: python .github/scripts/generate_docs.py

      - name: Commit updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add documentation.md
          git diff --staged --quiet || git commit -m "docs: auto-update [skip ci]"
          git push origin HEAD
